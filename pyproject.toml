[tool.ruff]
line-length = 100
target-version = "py314"

exclude = [
    ".git",
    ".idea",
    ".ruff_cache",
    ".venv",
    "__pycache__",
    "build",
    "dist",
    "logs",
]

[tool.ruff.lint]
select = [
    "E",    # базовые ошибки стиля Python
    "F",    # ошибки вроде неиспользуемых импортов и переменных
    "I",    # сортировка импортов
    "B",    # подозрительные конструкции в коде
    "C4",   # улучшение списковых, словарных и множественных выражений
    "SIM",  # упрощение слишком сложных конструкций
    "UP",   # обновление синтаксиса под новые версии Python
    "N",    # проверка имен функций, классов, переменных
    "A",    # запрет перекрытия встроенных имен Python, например list, id, file
    "PT",   # стиль тестов pytest
    "RUF",  # собственные правила Ruff
]

ignore = [
    "E501",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
